* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.tab { padding: 8px 16px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--color-text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: var(--color-text-primary); border-bottom: 2px solid var(--color-text-primary); font-weight: 500; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 500; }
.grid4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 1.5rem; }
.grid2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; margin-bottom: 1.5rem; }
label { font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px; }
select, input[type=text], input[type=number], input[type=date] { width: 100%; padding: 8px 10px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 12px; }
.btn { padding: 8px 16px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; background: var(--color-background-primary); color: var(--color-text-primary); }
.btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
.badge-pago { background: #EAF3DE; color: #3B6D11; }
.badge-devendo { background: #FCEBEB; color: #A32D2D; }
.badge-parcial { background: #FAEEDA; color: #854F0B; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { font-size: 11px; color: var(--color-text-secondary); font-weight: 500; text-align: left; padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
td { padding: 8px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
tr:last-child td { border-bottom: none; }
.devedor-bar { height: 6px; border-radius: 3px; background: #F0959580; margin-top: 4px; }
.devedor-fill { height: 100%; border-radius: 3px; background: #E24B4A; }
.section-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.alert { padding: 10px 14px; border-radius: var(--border-radius-md); font-size: 13px; margin-bottom: 12px; }
.alert-red { background: #FCEBEB; color: #A32D2D; border: 0.5px solid #F7C1C1; }
.alert-green { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #C0DD97; }
.section { display: none; }
.section.active { display: block; }
.empresa-card { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.empresa-card:last-child { border-bottom: none; }
</style>

<h2 class="sr-only">Painel de controle de reservas — Pousada Ecológica</h2>

<div style="padding: 1rem 0;">
<div class="tabs">

<div id="tab-dashboard" class="section active">

function excelDate(serial) {
  const d = new Date(1899,11,30);
  d.setDate(d.getDate() + serial);
  return d;
}

function fmtDate(d) {
  if (!d || isNaN(d)) return '-';
  return d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'});
}

function fmtBRL(v) {
  return 'R$ ' + Math.round(v).toLocaleString('pt-BR');
}

function getDevedores() {
  const map = {};
  [...reservas, ...refeicoes].forEach(r => {
    if (r.status !== 'pago') {
      if (!map[r.empresa]) map[r.empresa] = 0;
      map[r.empresa] += r.valor;
    }
  });
  return map;
}

function getTotalRecebido() {
  return [...reservas, ...refeicoes].filter(r => r.status === 'pago').reduce((s,r)=>s+r.valor,0);
}

function getTotalAReceber() {
  const d = getDevedores();
  return Object.values(d).reduce((s,v)=>s+v,0);
}

    <div class="metric"><div class="metric-label">Receita total</div><div class="metric-value">${fmtBRL(totalBruto)}</div></div>
    <div class="metric"><div class="metric-label">Já recebido</div><div class="metric-value" style="color:#3B6D11">${fmtBRL(recebido)}</div></div>
    <div class="metric"><div class="metric-label">A receber</div><div class="metric-value" style="color:#A32D2D">${fmtBRL(aReceber)}</div></div>
    <div class="metric"><div class="metric-label">Reservas cadastradas</div><div class="metric-value">${qtdReservas}</div></div>
  `;
}

function renderSituacaoFin() {
  const recebido = getTotalRecebido();
  const aReceber = getTotalAReceber();
  const total = recebido + aReceber;
  const pct = total > 0 ? Math.round(recebido/total*100) : 0;
  const el = document.getElementById('situacao-fin');
  const status = pct >= 80 ? 'verde' : pct >= 50 ? 'amarelo' : 'vermelho';
  const cor = status === 'verde' ? '#3B6D11' : status === 'amarelo' ? '#854F0B' : '#A32D2D';
  const bgCor = status === 'verde' ? '#EAF3DE' : status === 'amarelo' ? '#FAEEDA' : '#FCEBEB';
  const msg = status === 'verde' ? 'Situação saudável! A maioria dos pagamentos está em dia.' :
              status === 'amarelo' ? 'Atenção! Mais da metade ainda está a receber.' :
              'Alerta! Grande parte dos valores está em aberto.';
  el.innerHTML = `
    <div style="background:${bgCor};border-radius:8px;padding:12px;margin-bottom:12px">
      <p style="font-size:13px;color:${cor};font-weight:500">${msg}</p>
    </div>
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">
        <span>Recebido</span><span>${pct}%</span>
      </div>
      <div style="height:8px;background:var(--color-background-secondary);border-radius:4px">
        <div style="height:100%;width:${pct}%;background:${cor};border-radius:4px;transition:width 0.5s"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-top:8px">
      <span style="color:var(--color-text-secondary)">Recebido: <strong style="color:${cor}">${fmtBRL(recebido)}</strong></span>
      <span style="color:var(--color-text-secondary)">Pendente: <strong style="color:#A32D2D">${fmtBRL(aReceber)}</strong></span>
    </div>
  `;
}

function renderTopDevedores() {
  const d = getDevedores();
  const sorted = Object.entries(d).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const max = sorted[0] ? sorted[0][1] : 1;
  const el = document.getElementById('top-devedores');
  if (sorted.length === 0) {
    el.innerHTML = '<p style="font-size:13px;color:var(--color-text-secondary)">Nenhum devedor! Tudo em dia.</p>';
    return;
  }
  el.innerHTML = sorted.map(([emp, val]) => `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
        <span style="font-weight:500">${emp}</span>
        <span style="color:#A32D2D">${fmtBRL(val)}</span>
      </div>
      <div class="devedor-bar"><div class="devedor-fill" style="width:${Math.round(val/max*100)}%"></div></div>
    </div>
  `).join('');
}

function renderRecente() {
  const sorted = [...reservas].sort((a,b)=>b.data-a.data).slice(0,8);
  const el = document.getElementById('tabela-recente');
  el.innerHTML = sorted.map(r => `
    <tr>
      <td style="font-weight:500">${r.empresa}</td>
      <td>${fmtDate(r.data)}</td>
      <td>${r.tipo}</td>
      <td>${fmtBRL(r.valor)}</td>
      <td><span class="badge badge-${r.status}">${r.status === 'pago' ? 'Pago' : r.status === 'devendo' ? 'A receber' : 'Parcial'}</span></td>
      <td><button class="btn btn-sm" onclick="toggleStatus(${r.id})">${r.status === 'pago' ? 'Reabrir' : 'Marcar pago'}</button></td>
    </tr>
  `).join('');
}

function renderDevedores() {
  const d = getDevedores();
  const sorted = Object.entries(d).sort((a,b)=>b[1]-a[1]);
  const total = sorted.reduce((s,[,v])=>s+v,0);
  const el = document.getElementById('lista-devedores');
  const alerta = document.getElementById('alerta-status');

  if (total > 5000) {
    alerta.innerHTML = `<div class="alert alert-red">Você tem <strong>${fmtBRL(total)}</strong> em aberto com ${sorted.length} empresa(s). Considere entrar em contato para cobrar.</div>`;
  } else if (total > 0) {
    alerta.innerHTML = `<div class="alert alert-green">Você tem ${fmtBRL(total)} a receber. Valor dentro do esperado.</div>`;
  } else {
    alerta.innerHTML = `<div class="alert alert-green">Tudo em dia! Nenhum valor pendente.</div>`;
  }

  if (sorted.length === 0) {
    el.innerHTML = '<p style="font-size:13px;color:var(--color-text-secondary);padding:8px 0">Nenhum devedor no momento.</p>';
    return;
  }

  el.innerHTML = sorted.map(([emp, val]) => {
    const pendentes = [...reservas, ...refeicoes].filter(r => r.empresa === emp && r.status !== 'pago');
    return `
      <div class="empresa-card">
        <div>
          <p style="font-weight:500;font-size:14px">${emp}</p>
          <p style="font-size:12px;color:var(--color-text-secondary)">${pendentes.length} item(s) pendente(s)</p>
        </div>
        <div style="text-align:right">
          <p style="font-weight:500;color:#A32D2D">${fmtBRL(val)}</p>
          <button class="btn btn-sm" style="margin-top:4px" onclick="marcarEmpresaPaga('${emp}')">Quitar tudo</button>
        </div>
      </div>`;
  }).join('');

  const pgSel = document.getElementById('pg-empresa');
  pgSel.innerHTML = sorted.map(([emp])=>`<option value="${emp}">${emp}</option>`).join('');
}

function renderHistorico() {
  const filtroEmp = (document.getElementById('filtro-empresa').value || '').toLowerCase();
  const filtroStatus = document.getElementById('filtro-status').value;
  const filtered = reservas.filter(r => {
    const empOk = !filtroEmp || r.empresa.toLowerCase().includes(filtroEmp);
    const stOk = !filtroStatus || r.status === filtroStatus;
    return empOk && stOk;
  }).sort((a,b)=>b.data-a.data);
  const el = document.getElementById('tabela-historico');
  el.innerHTML = filtered.map(r => `
    <tr>
      <td style="font-weight:500">${r.empresa}</td>
      <td>${fmtDate(r.data)}</td>
      <td>${r.tipo}</td>
      <td>${r.qtd}</td>
      <td>${fmtBRL(r.valor)}</td>
      <td><span class="badge badge-${r.status}">${r.status === 'pago' ? 'Pago' : r.status === 'devendo' ? 'A receber' : 'Parcial'}</span></td>
      <td><button class="btn btn-sm" onclick="toggleStatus(${r.id})">${r.status === 'pago' ? 'Reabrir' : 'Pago'}</button></td>
    </tr>
  `).join('');
}

function renderAll() {
  renderMetrics();
  renderSituacaoFin();
  renderTopDevedores();
  renderRecente();
  renderDevedores();
  renderHistorico();
  updateDatalist();
}

function toggleStatus(id) {
  const r = reservas.find(x=>x.id===id);
  if (r) { r.status = r.status === 'pago' ? 'devendo' : 'pago'; renderAll(); }
}

function marcarEmpresaPaga(emp) {
  [...reservas, ...refeicoes].forEach(r => { if(r.empresa===emp) r.status='pago'; });
  renderAll();
}

function registrarPagamento() {
  const emp = document.getElementById('pg-empresa').value;
  const val = parseFloat(document.getElementById('pg-valor').value);
  if (!emp || isNaN(val)) { document.getElementById('pg-msg').innerHTML = '<span style="color:#A32D2D">Preencha empresa e valor.</span>'; return; }
  let restante = val;
  [...reservas, ...refeicoes].filter(r=>r.empresa===emp&&r.status!=='pago').forEach(r => {
    if (restante <= 0) return;
    if (restante >= r.valor) { r.status='pago'; restante -= r.valor; }
    else { r.status='parcial'; restante=0; }
  });
  document.getElementById('pg-msg').innerHTML = `<span style="color:#3B6D11">Pagamento de ${fmtBRL(val)} registrado para ${emp}.</span>`;
  renderAll();
}

function adicionarReserva() {
  const empresa = document.getElementById('f-empresa').value.trim().toUpperCase();
  const data = document.getElementById('f-data').value;
  const tipo = document.getElementById('f-tipo').value;
  const qtd = parseInt(document.getElementById('f-qtd').value) || 1;
  const valor = parseFloat(document.getElementById('f-valor').value);
  const status = document.getElementById('f-status').value;
  const obs = document.getElementById('f-obs').value;
  if (!empresa || !data || !tipo || isNaN(valor)) {
    document.getElementById('form-msg').innerHTML = '<span style="color:#A32D2D">Preencha todos os campos obrigatórios.</span>';
    return;
  }
  const d = new Date(data + 'T00:00:00');
  const novaId = reservas.length;
  reservas.push({ id: novaId, empresa, data: d, tipo, qtd, valor: valor*qtd, status, obs });
  document.getElementById('form-msg').innerHTML = `<span style="color:#3B6D11">Reserva de ${empresa} salva com sucesso!</span>`;
  limparForm();
  renderAll();
}

function adicionarRefeicao() {
  const empresa = document.getElementById('r-empresa').value.trim().toUpperCase();
  const data = document.getElementById('r-data').value;
  const qtd = parseInt(document.getElementById('r-qtd').value) || 1;
  const valorUnit = parseFloat(document.getElementById('r-valor').value) || 40;
  const status = document.getElementById('r-status').value;
  if (!empresa || !data) return;
  const d = new Date(data + 'T00:00:00');
  refeicoes.push({ id: 'r'+Date.now(), empresa, data:d, qtd, valorUnit, valor: qtd*valorUnit, status });
  renderAll();
  document.getElementById('r-empresa').value='';
  document.getElementById('r-data').value='';
}

function limparForm() {
  ['f-empresa','f-data','f-tipo','f-qtd','f-valor','f-obs','f-data-pg'].forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName==='SELECT') el.selectedIndex=0;
    else if (id==='f-qtd') el.value='1';
    else el.value='';
  });
}

function updateDatalist() {
  const empresas = [...new Set(reservas.map(r=>r.empresa))].sort();
  document.getElementById('lista-empresas').innerHTML = empresas.map(e=>`<option value="${e}">`).join('');
}

function showTab(name) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => { if(t.textContent.toLowerCase().includes(name==='nova'?'nova':name==='devedores'?'deve':name==='historico'?'hist':'pain')) t.classList.add('active'); });
  const map = {dashboard:0, nova:1, devedores:2, historico:3};
  document.querySelectorAll('.tab')[map[name]].classList.add('active');
}

initData();
renderAll();
</script>
